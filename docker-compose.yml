# ============================================================================
# Beacon Stack — self-hosted media management
# https://beaconstack.io
#
# First run:
#   1. cp .env.example .env
#   2. Edit .env — at minimum set TV_PATH, MOVIES_PATH, DOWNLOADS_PATH to point
#      at your storage. (Same filesystem, see note below.)
#   3. docker compose up -d
#
# Web UIs:  Pulse :9696 · Pilot :8383 · Prism :8282 · Haul :8484
#
# IMPORTANT: TV_PATH, MOVIES_PATH, and DOWNLOADS_PATH must sit on the SAME
# filesystem. Imports use hardlinks + atomic moves; on different filesystems
# the stack falls back to copies (slow, wastes disk). Easiest layout:
# everything under one root, e.g. /opt/media/{tv,movies,downloads}.
#
# Optional:
#   - VPN tunnel for Haul:        see docker-compose.vpn.yml
#   - FlareSolverr (Cloudflare):  COMPOSE_PROFILES=flaresolverr in .env
# ============================================================================

# YAML anchors below cut ~50 lines of boilerplate. Each &name defines a
# reusable block; <<: *name merges it into a service. Edit once, applies
# everywhere.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &healthcheck-base
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

# Shared env for all four Beacon services. Per-service env (DB DSN, ports)
# is added in each service block.
x-app-env: &app-env
  TZ: ${TZ:-UTC}

networks:
  beacon-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
  beacon-secrets:

services:

  # One-shot sidecar — generates random DB passwords on first run.
  # Idempotent: skips files that already exist on subsequent runs.
  init-secrets:
    image: alpine:3.21
    container_name: init-secrets
    restart: "no"
    volumes:
      - beacon-secrets:/secrets
      - ./scripts:/scripts:ro
    command: ["/scripts/init-secrets.sh"]
    logging: *default-logging

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/pg.txt
      TZ: ${TZ:-UTC}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - beacon-secrets:/run/secrets:ro
    networks:
      - beacon-net
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      start_period: 30s
    logging: *default-logging

  # One-shot sidecar — creates per-service DB users + databases after
  # Postgres is healthy. Idempotent; does nothing on subsequent runs.
  init-databases:
    image: postgres:17-alpine
    container_name: init-databases
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - beacon-secrets:/run/secrets:ro
      - ./scripts:/scripts:ro
    command: ["/scripts/init-databases.sh"]
    networks:
      - beacon-net
    logging: *default-logging

  pulse:
    image: ghcr.io/beacon-stack/pulse:latest
    container_name: pulse
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
    # Most env (DSN, secret-file paths, Pulse URL) is baked into the image.
    # Only the operator-facing knobs live here.
    environment:
      <<: *app-env
      PULSE_LOG_LEVEL: ${LOG_LEVEL:-info}
      # OPT-IN: Docker socket access for per-container CPU / memory /
      # network / IO on the dashboard. Disabled by default because the
      # socket effectively grants root on the host on most Docker builds,
      # even when mounted read-only. To enable: uncomment BOTH the env
      # var below AND the docker.sock volume mount further down.
      # PULSE_DASHBOARD_DOCKER_SOCKET: /var/run/docker.sock
      # OPT-IN: FlareSolverr — used by Pulse's torznab scraper to bypass
      # Cloudflare challenges on indexers like 1337x and kickasstorrents
      # that otherwise return HTTP 403. Disabled by default. To enable,
      # uncomment the line below and add COMPOSE_PROFILES=flaresolverr
      # to your .env (which also starts the flaresolverr container).
      # PULSE_FLARESOLVERR_URL: ${PULSE_FLARESOLVERR_URL:-http://flaresolverr:8191}
    volumes:
      - beacon-secrets:/run/secrets:ro
      - ${PULSE_CONFIG_PATH:-./config/pulse}:/config
      # OPT-IN: uncomment together with PULSE_DASHBOARD_DOCKER_SOCKET above.
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - beacon-net
    ports:
      - "${PULSE_PORT:-9696}:9696"
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9696/health"]
    logging: *default-logging

  pilot:
    image: ghcr.io/beacon-stack/pilot:latest
    container_name: pilot
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
      pulse:
        condition: service_healthy
    environment:
      <<: *app-env
      PILOT_LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - beacon-secrets:/run/secrets:ro
      - ${PILOT_CONFIG_PATH:-./config/pilot}:/config
      - ${TV_PATH:-/path/to/tv}:/tv
      - ${DOWNLOADS_PATH:-/path/to/downloads}:/downloads
    networks:
      - beacon-net
    ports:
      - "${PILOT_PORT:-8383}:8383"
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8383/health"]
    logging: *default-logging

  prism:
    image: ghcr.io/beacon-stack/prism:latest
    container_name: prism
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
      pulse:
        condition: service_healthy
    environment:
      <<: *app-env
      PRISM_LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - beacon-secrets:/run/secrets:ro
      - ${PRISM_CONFIG_PATH:-./config/prism}:/config
      - ${MOVIES_PATH:-/path/to/movies}:/movies
      - ${DOWNLOADS_PATH:-/path/to/downloads}:/downloads
    networks:
      - beacon-net
    ports:
      - "${PRISM_PORT:-8282}:8282"
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8282/health"]
    logging: *default-logging

  haul:
    image: ghcr.io/beacon-stack/haul:latest
    container_name: haul
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      HAUL_LOG_LEVEL: ${LOG_LEVEL:-info}
      # Admin diagnostics tab (Settings → System → Diagnostics). Off by
      # default; flip to "true" in .env when you need to inspect/clean
      # orphan DB rows. See haul/internal/db/admin/ for the diagnostic
      # registry.
      HAUL_ADMIN_DIAGNOSTICS_ENABLED: ${HAUL_ADMIN_DIAGNOSTICS_ENABLED:-false}
      HAUL_CLEANUP_RETENTION_DAYS: ${HAUL_CLEANUP_RETENTION_DAYS:-30}
    volumes:
      - beacon-secrets:/run/secrets:ro
      - ${HAUL_CONFIG_PATH:-./config/haul}:/config
      - ${DOWNLOADS_PATH:-/path/to/downloads}:/downloads
    networks:
      - beacon-net
    ports:
      - "${HAUL_PORT:-8484}:8484"
      - "${HAUL_TORRENT_PORT:-6881}:6881/tcp"
      - "${HAUL_TORRENT_PORT:-6881}:6881/udp"
    healthcheck:
      <<: *healthcheck-base
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8484/health"]
      start_period: 30s
    logging: *default-logging

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    profiles:
      - flaresolverr
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
    networks:
      - beacon-net
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    logging: *default-logging
