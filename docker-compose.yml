# ============================================================================
# Beacon Stack — self-hosted media management
# https://beaconstack.io
#
# Quick start:
#   1. Edit the /path/to/... lines below to point at your storage.
#   2. docker compose up -d
#
# That's it. A one-shot sidecar generates random database passwords on
# first run and stores them in a Docker-managed volume. Web UIs:
#   - Pulse:  http://localhost:9696
#   - Pilot:  http://localhost:8383  (TV)
#   - Prism:  http://localhost:8282  (Movies)
#   - Haul:   http://localhost:8484  (Torrent client)
#
# IMPORTANT: your TV/Movies library and downloads directory must sit on
# the SAME filesystem. Imports use hardlinks + atomic moves; if the two
# paths are on different filesystems, the stack falls back to copies
# (slow, wastes disk). Easiest setup: put everything under one root
# (e.g. /opt/media/tv, /opt/media/movies, /opt/media/downloads).
#
# Optional:
#   - VPN tunnel for Haul (see docker-compose.vpn.yml)
#   - FlareSolverr for Cloudflare-protected indexers:
#       COMPOSE_PROFILES=flaresolverr docker compose up -d
# ============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  beacon-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
  beacon-secrets:

services:

  # One-shot sidecar — generates random DB passwords on first run.
  # Idempotent: skips files that already exist on subsequent runs.
  init-secrets:
    image: alpine:3.21
    container_name: beacon-init-secrets
    restart: "no"
    volumes:
      - beacon-secrets:/secrets
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        for name in pg pulse pilot prism haul pulse-api-key; do
          f="/secrets/$${name}.txt"
          if [ ! -s "$$f" ]; then
            head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 32 > "$$f"
            echo "generated $$f"
          fi
          chmod 0444 "$$f"
        done
    logging: *default-logging

  postgres:
    image: postgres:17-alpine
    container_name: beacon-postgres
    restart: unless-stopped
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/pg.txt
      TZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
      - beacon-secrets:/run/secrets:ro
    networks:
      - beacon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # One-shot sidecar — creates per-service DB users + databases after
  # Postgres is healthy. Idempotent; does nothing on subsequent runs.
  init-databases:
    image: postgres:17-alpine
    container_name: beacon-init-databases
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - beacon-secrets:/run/secrets:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        export PGPASSWORD="$$(cat /run/secrets/pg.txt)"
        for name in pulse pilot prism haul; do
          pw="$$(cat /run/secrets/$${name}.txt)"
          exists=$$(psql -h postgres -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='$$name'")
          if [ "$$exists" != "1" ]; then
            psql -h postgres -U postgres -v pw="$$pw" -c "CREATE USER $$name WITH PASSWORD :'pw'"
          fi
          dbexists=$$(psql -h postgres -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$${name}_db'")
          if [ "$$dbexists" != "1" ]; then
            psql -h postgres -U postgres -c "CREATE DATABASE $${name}_db OWNER $$name"
          fi
        done
    networks:
      - beacon-net
    logging: *default-logging

  pulse:
    image: ghcr.io/beacon-stack/pulse:latest
    container_name: beacon-pulse
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
    environment:
      PULSE_DATABASE_DRIVER: postgres
      PULSE_DATABASE_DSN: postgres://pulse@postgres:5432/pulse_db?sslmode=disable
      PULSE_DATABASE_PASSWORD_FILE: /run/secrets/pulse.txt
      PULSE_AUTH_API_KEY_FILE: /run/secrets/pulse-api-key.txt
      PULSE_SERVER_EXTERNAL_URL: http://pulse:9696
      PULSE_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - beacon-secrets:/run/secrets:ro
      - /path/to/pulse/config:/config
    networks:
      - beacon-net
    ports:
      - "9696:9696"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9696/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  pilot:
    image: ghcr.io/beacon-stack/pilot:latest
    container_name: beacon-pilot
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
      pulse:
        condition: service_healthy
    environment:
      PILOT_DATABASE_DRIVER: postgres
      PILOT_DATABASE_DSN: postgres://pilot@postgres:5432/pilot_db?sslmode=disable
      PILOT_DATABASE_PASSWORD_FILE: /run/secrets/pilot.txt
      PILOT_PULSE_URL: http://pulse:9696
      PILOT_PULSE_API_KEY_FILE: /run/secrets/pulse-api-key.txt
      PILOT_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - beacon-secrets:/run/secrets:ro
      - /path/to/pilot/config:/config
      - /path/to/tv:/tv                  # optional
      - /path/to/downloads:/downloads    # optional
    networks:
      - beacon-net
    ports:
      - "8383:8383"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8383/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  prism:
    image: ghcr.io/beacon-stack/prism:latest
    container_name: beacon-prism
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
      pulse:
        condition: service_healthy
    environment:
      PRISM_DATABASE_DRIVER: postgres
      PRISM_DATABASE_DSN: postgres://prism@postgres:5432/prism_db?sslmode=disable
      PRISM_DATABASE_PASSWORD_FILE: /run/secrets/prism.txt
      PRISM_PULSE_URL: http://pulse:9696
      PRISM_PULSE_API_KEY_FILE: /run/secrets/pulse-api-key.txt
      PRISM_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - beacon-secrets:/run/secrets:ro
      - /path/to/prism/config:/config
      - /path/to/movies:/movies          # optional
      - /path/to/downloads:/downloads    # optional
    networks:
      - beacon-net
    ports:
      - "8282:8282"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8282/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  haul:
    image: ghcr.io/beacon-stack/haul:latest
    container_name: beacon-haul
    restart: unless-stopped
    depends_on:
      init-databases:
        condition: service_completed_successfully
    environment:
      HAUL_DATABASE_DRIVER: postgres
      HAUL_DATABASE_DSN: postgres://haul@postgres:5432/haul_db?sslmode=disable
      HAUL_DATABASE_PASSWORD_FILE: /run/secrets/haul.txt
      HAUL_PULSE_URL: http://pulse:9696
      HAUL_PULSE_API_KEY_FILE: /run/secrets/pulse-api-key.txt
      HAUL_TORRENT_LISTEN_PORT: 6881
      HAUL_TORRENT_DOWNLOAD_DIR: /downloads
      HAUL_LOG_LEVEL: info
      TZ: UTC
    volumes:
      - beacon-secrets:/run/secrets:ro
      - /path/to/haul/config:/config
      - /path/to/downloads:/downloads
    networks:
      - beacon-net
    ports:
      - "8484:8484"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8484/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: beacon-flaresolverr
    restart: unless-stopped
    profiles:
      - flaresolverr
    environment:
      LOG_LEVEL: info
      TZ: UTC
    networks:
      - beacon-net
    ports:
      - "8191:8191"
    logging: *default-logging
