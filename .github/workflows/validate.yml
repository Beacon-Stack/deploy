name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Populate secrets via setup-secrets.sh
        run: ./setup-secrets.sh

      - name: Validate docker-compose.yml (vpn profile)
        env:
          COMPOSE_PROFILES: vpn
        run: docker compose config --quiet

      - name: Validate docker-compose.yml (novpn profile)
        env:
          COMPOSE_PROFILES: novpn
        run: docker compose config --quiet

      - name: Validate docker-compose.yml (vpn,flaresolverr profile)
        env:
          COMPOSE_PROFILES: vpn,flaresolverr
        run: docker compose config --quiet

      - name: Check init-db.sh is executable and syntactically valid
        run: |
          test -x init-db.sh
          bash -n init-db.sh

      - name: Check setup-secrets.sh is executable and syntactically valid
        run: |
          test -x setup-secrets.sh
          bash -n setup-secrets.sh
