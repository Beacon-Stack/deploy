name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate base docker-compose.yml (no .env needed)
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate with flaresolverr profile
        env:
          COMPOSE_PROFILES: flaresolverr
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate with VPN override
        env:
          VPN_USERNAME: ci
          VPN_PASSWORD: ci
        run: docker compose -f docker-compose.yml -f docker-compose.vpn.yml config --quiet

      - name: Validate with VPN override + flaresolverr profile
        env:
          COMPOSE_PROFILES: flaresolverr
          VPN_USERNAME: ci
          VPN_PASSWORD: ci
        run: docker compose -f docker-compose.yml -f docker-compose.vpn.yml config --quiet

      - name: Validate maintainer override example
        run: docker compose -f docker-compose.yml -f docker-compose.override.example.yml config --quiet
