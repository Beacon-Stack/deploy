# ============================================================================
# Beacon Stack — development override
#
# Swaps published ghcr.io images for local builds from the sibling service
# repos under dev/beacon/. Load it alongside docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Or set COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml in .env and
# plain `docker compose up -d` will apply both files automatically. See
# .env.dev.example for a ready-made starting point.
#
# The 'image:' lines keep the same ghcr.io tags so you can rebuild with
# `docker compose build`, reuse the last build with `docker compose up`,
# or fall back to `docker compose pull && docker compose up` without the
# override to run the published images verbatim.
# ============================================================================

services:
  pulse:
    build:
      context: ../pulse
      dockerfile: Dockerfile
    image: ghcr.io/beacon-stack/pulse:latest

  # Pilot and Prism bake third-party metadata keys into the binary via
  # ldflags. CI reads these from repo secrets; for local builds, set
  # PILOT_TMDB_API_KEY / PILOT_TRAKT_CLIENT_ID (same for PRISM_*) in .env
  # or your shell — otherwise the built image ships with empty defaults
  # and the app will 503 on series/movie lookup until a runtime override
  # is supplied.
  pilot:
    build:
      context: ..
      dockerfile: pilot/docker/Dockerfile.beacon
      args:
        TMDB_API_KEY: ${PILOT_TMDB_API_KEY:-}
        TRAKT_CLIENT_ID: ${PILOT_TRAKT_CLIENT_ID:-}
    image: ghcr.io/beacon-stack/pilot:latest

  prism:
    build:
      context: ..
      dockerfile: prism/docker/Dockerfile.beacon
      args:
        TMDB_API_KEY: ${PRISM_TMDB_API_KEY:-}
        TRAKT_CLIENT_ID: ${PRISM_TRAKT_CLIENT_ID:-}
    image: ghcr.io/beacon-stack/prism:latest

  # Haul's Dockerfile expects the haul repo root as build context
  # (unlike pilot/prism/.beacon Dockerfiles which expect the beacon/ root).
  haul:
    build:
      context: ../haul
      dockerfile: docker/Dockerfile
    image: ghcr.io/beacon-stack/haul:latest
