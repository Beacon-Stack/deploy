# ============================================================================
# Beacon Stack — local override (advanced)
#
# Most users won't need this file. For media paths, ports, PUID/PGID, etc.,
# just edit .env — that covers 99% of customization.
#
# Use docker-compose.override.yml only for things .env can't do:
#   - Extra bind mounts (e.g., a second media library)
#   - Adding sysctls / cap_add for a specific deployment
#   - Overriding healthcheck timing for slow hardware
#
# Setup:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#   # edit it
#
# `docker-compose.override.yml` is gitignored and auto-loaded by plain
# `docker compose` — it merges on top of docker-compose.yml automatically.
# ============================================================================

# `services: {}` keeps this file a valid compose document so CI can
# validate it as-is. Replace with real overrides — see examples below.
services: {}

# Example: mount a second TV library read-only.
# services:
#   pilot:
#     volumes:
#       - /mnt/archive/tv:/tv-archive:ro

# Example: relax healthcheck timing for slow CPUs / NAS hardware.
# services:
#   pulse:
#     healthcheck:
#       start_period: 60s

# Example: pin a specific image tag instead of `:latest`.
# services:
#   prism:
#     image: ghcr.io/beacon-stack/prism:v1.4.2
